<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Building</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            font-family: default;
            grid-column: auto;
            text-align: center;
            border: 3px groove yellow;
        }

        #navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            padding: 10px 20px;
            border: 1px solid red;

        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .menu a {
            color: white;
            text-decoration: dotted;
            margin-left: 20px;
            font-size: 18px;
            text-transform: initial;
        }

        .menu a:hover {
            text-decoration: underline;
        }


        .menu a {
            margin-left: 0;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div id="navbar">
                <div class="logo">Restraunt la francais</div>
                <div class="menu">
                    <a href="#home">Home</a>
                    <a href="#about">About</a>
                    <a href="#services">Services</a>
                    <a href="#contact">Contact</a>
                </div>
            </div>
        </nav>
    </header>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Welcome to Website Building</h5>
                        <img src="menu.jpg" class="img-fluid" alt="Banner Image"
                            style="max-width: 200%; height: 400px; object-fit: cover;">
                        <p class="card-text mt-3">This is a simple website built using HTML and Bootstrap on a
                            restaurant website.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
